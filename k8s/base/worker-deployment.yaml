apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: examflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      serviceAccountName: examflow-ksa
      containers:
        - name: worker-service
          image: europe-west1-docker.pkg.dev/bitirme-pubsub/examflow-images/examflow-worker:latest
          imagePullPolicy: Always
          env:
            - name: GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: examflow-config
                  key: GCP_PROJECT_ID
            - name: PUBSUB_SUBSCRIPTION
              valueFrom:
                configMapKeyRef:
                  name: examflow-config
                  key: PUBSUB_SUBSCRIPTION
            - name: PUBSUB_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: examflow-config
                  key: PUBSUB_TOPIC
            - name: APP_ENV
              valueFrom:
                secretKeyRef:
                  name: examflow-secret
                  key: APP_ENV
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"